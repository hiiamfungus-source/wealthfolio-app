manifestVersion: 1
id: cunda-wealthfolio
category: finance
name: Wealthfolio
version: "1.0.0"
tagline: Open-source and private investment tracker
description: >-
  Wealthfolio is a self-hosted investment tracker designed to keep your financial data private.

  It allows you to track assets, ETFs, and crypto in a clean, unified interface.
developer: Wealthfolio
website: https://wealthfolio.app
dependencies: []
repo: https://github.com/wealthfolio/wealthfolio
support: https://github.com/wealthfolio/wealthfolio/issues
port: 8088
gallery: []
path: ""
deterministicPassword: false
torOnly: false
submitter: Fungus
submission: https://github.com/getumbrel/umbrel-apps
formFields:
  - id: APP_WEALTHFOLIO_SECRET
    name: "JWT Secret Key"
    type: text
    description: "Enter your 32-byte base64 secret key"
    required: true
  - id: APP_WEALTHFOLIO_PASSWORD
    name: "Argon2id Password Hash"
    type: text
    description: "Enter the Argon2id hash of your password (use single dollars)"
    required: true
